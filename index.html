<!DOCTYPE html>
<html>
<head>
  <title>CI/CD Sample 1</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container{
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    h2{
      text-align: center;
    }

    input{
      width: 70%;
      padding: 8px;
    }

    button{
      padding: 8px 10px;
      cursor: pointer;
      background-color: green;
      color: white;
      border: none;
      border-radius: 5px;
    }

    ul{
      margin-top: 15px;
      padding: 0;
    }

    li{
      list-style: none;
      background: #eee;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
    }

    .delete{
      background: red;
      color: white;
      border: none;
      padding: 5px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>TO-DO LIST</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
  </div>

  <script>
    function addTask() {
      let input = document.getElementById("taskInput");
      let task = input.value;

      if(task === ""){
        alert("Please enter a task");
        return;
      }

      let li = document.createElement("li");
      li.innerHTML = `
        ${task}
        <button class="delete" onclick="this.parentElement.remove()">
          X
        </button>
      `;

      document.getElementById("taskList").appendChild(li);

      input.value = "";
    }
  </script>

</body>
</html>
